services:

  api:
    container_name: martelpop-api

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./storage:/code/storage
      - ./logs:/code/logs

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  db:
    container_name: martelpop-db

    image: postgres:18

    restart: unless-stopped

    environment:
      POSTGRES_DB: martelpop
      POSTGRES_USER: martelpop
      POSTGRES_PASSWORD: martelpop

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U martelpop" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:

    image: dpage/pgadmin4

    container_name: martelpop-pgadmin

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@martelpop.dev
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:

  postgres_data:

  pgadmin_data: